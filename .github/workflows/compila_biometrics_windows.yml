name: biometrics windows

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["compilar biometrics"]
    types:
      - completed

jobs:
  compiling_package:
    runs-on: windows-latest

    steps:
    - name: Checkout labPackages repository
      uses: actions/checkout@v5.0.0

    - name: Checkout library_biometrics repository
      uses: actions/checkout@v5.0.0
      with:
        repository: cseljatib/library_biometrics
        token: ${{ secrets.csetoken }}
        ref: biometrics-cleanup
        path: elotrorepo

    - name: Install R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    - name: Instalando dependencias
      uses: r-lib/actions/setup-r-dependencies@v2
      
    - name: Instalando latex
      uses: r-lib/actions/setup-tinytex@v2
      
    - name: Run 00maestroCreador.r
      run: |
        cd elotrorepo
        Rscript 00maestroCreador.r
        Remove-Item ..\biometrics*.zip
        Copy-Item biometrics*.zip ..\
        cd ..\

    - name: Push new changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add .
        git commit -m "new windows biometrics build"
        git push
